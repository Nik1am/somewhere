                "Readme.txt": {
                    data: "Если вы читаете это - значит вам не следует тут находиться! Даже не пытайтесь зайти в папку <TODO>!!! >:)",
                    is_dir: false
                },
                images:{
                    is_dir: true,
                    "img1.png": {
                        data: "",
                        is_dir: false
                    }
                }
            }
        }
        commands = {
            bad_apple: {
                _:(args)=>{
                    open("https://www.youtube.com/watch?v=dQw4w9WgXcQ")
                }
            },
            cat_img: {
                d: "Read image file",
                _:(args)=>{
                    path = `${pwd}/${args[0]}`
                    file = fs.get_dir(path)
                    if(file){
                        if(!file.is_dir){
                            print_img(file.data)
                            print()
                        }
                        else {
                            print(`${args[0]} is not a file!`)
                        }
                    }
                    else {
                        print(`cat: ${args[0]}: No such file or directory`)
                    }
                }
            },
            cat: {
                d: "Read text file",
                _:(args)=>{
                    path = `${pwd}/${args[0]}`
                    file = fs.get_dir(path)
                    if(file){
                        if(!file.is_dir){
                            print(file.data)
                        }
                        else {
                            print(`${args[0]} is not a file!`)
                        }
                    }
                    else {
                        print(`cat: ${args[0]}: No such file or directory`)
                    }
                }
            },
            cd: {
                d: "Change directory",
                _:(args)=>{
                    let path;
                    if(args[0]){
                        if(args[0] == ".."){
                            pwd = pwd.split("/").slice(0,pwd.split("/").length-1).join("/")
                            return 0
                        }
                        path = `${pwd}/${args[0]}`
                        dir = fs.get_dir(path)
                        if(dir){
                            if(dir.is_dir){
                                pwd = path
                            }
                            else {
                                print(`${args[0]} is not a directory!`)
                            }
                            
                        }
                        else {
                            print(`Unknown directory ${args[0]}!`)
                        }
                    }
                }
            },
            cls:{
                _:(args)=>{
                    console_lines.innerHTML = ""
                },
                d: "Clears the screen"
            },
            echo: {
                _:(args)=>{
                    s = args.join(" ")
                    print(s)
                },
                d: "Prints message to console"
            },
            help: {
                _:(args)=>{
                    if(!args[0]){
                        keys = Object.keys(commands)
                        for(i = 0; i < keys.length; i++){
                            if(commands[keys[i]].d){
                                print(`${keys[i]} - ${commands[keys[i]].d}`)
                            }
                        }
                    }
                    else {
                        print(`${args[0]} - ${commands[args[0]].d}`)
                    }
                },
                d: "Shows this message. You can get description of specific command using 'help <command>'"
            },
            ls: {
                _: (args) => {
                    if(!args[0]){
                        dir = fs.get_dir(pwd)
                        keys = Object.keys(dir)
                        for(i = 1; i < keys.length; i++){
                            if(dir[keys[i]].is_dir){
                                print(keys[i],"\n","var(--dir-color)")
                            }
                            else {
                                print(keys[i])
                            }
                        }
                    }    
                },
                d: "List files in current or specified directory"
            }
        }
        function print_img(str = "") {
            e = document.createElement("img")
            e.src = str
            e.className = "console_img"
            console_lines.append(e)
        }
        function print(str = "", end = "\n", color = "var(--fg-color)") {
            e = document.createElement("span")
            e.innerText = str + end
            e.style.color = color
            console_lines.append(e)
        }
        function process_command() {
            command = console_input.value
            command_history.push(command)
            command_history_iterator = command_history.length
            print([pwd,command].join("/"))
            args = command.split(" ")
            if(args[0] in commands){
                commands[ args[0] ]._(args.slice(1))
            }
            else {
                print(`${args[0]}: command not found. Type "help" to get list of all commands.   `)
            }
            console_input.value = ""
            console_dir.innerText = pwd  
        }
        window.onload = () => {
            pwd = "home"
            console_dir.innerText = pwd
            console_input.focus()
            print("Welcome to SAWos 0.85.92\nLogged in as: Anonymous")
        }
        window.onclick = () => {
            console_input.focus()
        }
        document.addEventListener("keydown", function (e) {
            switch (e.keyCode) {
                case 13: // <Enter>
                    process_command()
                    break;
                case 9: // <Tab>
                    break;
                case 38: // <ArrowUp>
                    command_history_iterator--
                    if(command_history[command_history_iterator]){
                        console_input.value = command_history[command_history_iterator]
                    }
                    else {
                        command_history_iterator++
                    }
                    break;
                case 40: // <ArrowDown>
                    command_history_iterator++
                    if(command_history[command_history_iterator]){
                        console_input.value = command_history[command_history_iterator]
                    }
                    else {
                        command_history_iterator--
                    }
                    break;
                default:
                    break;
            }
        });
    </script>
    <div id="console_wrapper">
        <div id="console_lines">

        </div>
        <span id="console_dir"></span>/<input type="text" id="console_input">
    </div>
</body>
